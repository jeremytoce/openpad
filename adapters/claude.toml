fidelity = "full"

[actions]
approve        = "y"           # documented: confirm:yes = Y or Enter
approve_always = "2"           # EMPIRICAL-PENDING: digit vs Tab+y (docs/verification.md)
reject         = "n"           # documented: confirm:no = N (Esc also rejects when dialog open)
interrupt      = "Escape"      # stops current response/tool call
ask            = ""            # focuses pane; typing is the user's
plan           = "S-Tab"       # cycles default → acceptEdits → plan (cycle, not toggle)
compact        = "/compact\n"
clear          = "/clear\n"
model          = "/model\n"
undo           = "Escape Escape"  # opens rewind menu on empty input

[events]
SessionStart       = "IDLE"
UserPromptSubmit   = "THINKING"
PreToolUse         = "RUNNING"
PostToolUse        = "RUNNING"
PostToolUseFailure = "ERROR"
Notification       = "WAITING"
Stop               = "DONE"
StopFailure        = "ERROR"
SubagentStop       = "RUNNING"
SessionEnd         = "IDLE"
