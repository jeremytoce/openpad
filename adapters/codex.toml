# Codex CLI ships a full hooks system (PermissionRequest, PreToolUse, Stop, ...)
# with stdin-JSON payloads carrying hook_event_name — same shape as Claude's.
# See docs/verification.md. The argv-based `notify` (agent-turn-complete) remains
# a fallback for older Codex versions.
fidelity = "full"

[actions]
approve        = "y"           # "Yes, proceed (y)"
approve_always = "p"           # "Yes, and don't ask again for commands starting with <prefix> (p)"
reject         = "Escape"      # "No, and tell Codex what to do differently (esc)"
interrupt      = "Escape"      # single Esc interrupts a running turn
plan           = "/plan\n"
compact        = "/compact\n"
clear          = "/new\n"
model          = "/model\n"
review         = "/review\n"

[events]
SessionStart        = "IDLE"
UserPromptSubmit    = "THINKING"
PreToolUse          = "RUNNING"
PostToolUse         = "RUNNING"
PermissionRequest   = "WAITING"
SubagentStop        = "RUNNING"
Stop                = "DONE"
agent-turn-complete = "DONE"   # notify fallback path
